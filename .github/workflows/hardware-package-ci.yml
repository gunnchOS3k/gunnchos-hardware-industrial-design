name: EVT-1 hardware package CI

on:
  push:
    branches: [main, master, hardware-evt1-*]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest pyyaml
      - name: Required files
        run: python3 scripts/check_required_files.py
      - name: BOM validation
        run: python3 scripts/validate_bom.py
      - name: Power budget validation
        run: python3 scripts/validate_power_budget.py
      - name: Issue closure matrix
        run: python3 scripts/validate_issue_closure_matrix.py
      - name: Production track validation
        run: python3 scripts/validate_production_track.py
      - name: STL export validation
        run: python3 scripts/validate_stl_exports.py
      - name: Mechanical correctness validation
        run: python3 scripts/validate_mechanical_correctness.py
      - name: Printability validation
        run: python3 scripts/validate_printability.py
      - name: DVT/PVT readiness validation
        run: python3 scripts/validate_dvt_pvt_readiness.py
      - name: Certification readiness validation
        run: python3 scripts/validate_certification_readiness.py
      - name: Production release gate validation
        run: python3 scripts/validate_production_release_gate.py
      - name: External evidence layer validation
        run: python3 scripts/validate_external_evidence_layer.py
      - name: OS compatibility handoff validation
        run: python3 scripts/validate_os_compatibility_handoff.py
      - name: Firmware OS interface validation
        run: python3 scripts/validate_firmware_os_interface.py
      - name: Hardware OS validation package
        run: python3 scripts/validate_hardware_os_validation.py
      - name: HLK readiness validation
        run: python3 scripts/validate_hlk_readiness.py
      - name: Firmware manifest validation
        run: python3 scripts/validate_firmware_manifests.py
      - name: Firmware descriptor validation
        run: python3 scripts/validate_firmware_descriptors.py
      - name: Capsule update simulation validation
        run: python3 scripts/validate_capsule_update_simulation.py
      - name: Firmware implementation validation
        run: python3 scripts/validate_firmware_implementation.py
      - name: Firmware compatibility smoke
        run: python3 scripts/run_firmware_compat_smoke.py
      - name: Package tests
        run: pytest -q
