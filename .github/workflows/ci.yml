name: Portfolio hardening CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Required files
        run: python3 scripts/check_required_files.py
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest
      - name: EVT-1 BOM validation
        run: python3 scripts/validate_bom.py
      - name: EVT-1 tests
        run: pytest -q tests/test_bom_schema.py tests/test_required_files.py
