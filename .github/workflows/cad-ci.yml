name: CAD CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: BOM schema tests
        run: pip install pytest && pytest -q tests/
      - name: OpenSCAD check (non-blocking)
        run: |
          if command -v openscad >/dev/null; then
            bash scripts/render_openscad.sh || true
          else
            echo "OpenSCAD not installed; skipping STL export (expected in CI)."
          fi
